services:
  client:
    build:
      context: ./packages/client
      args:
        - CLIENT_PORT=${CLIENT_PORT}
    volumes:
      - ./packages/client:/app:delegated
      - client_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    ports:
      - "${CLIENT_PORT:-5173}:${CLIENT_PORT:-5173}"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://server:${SERVER_PORT:-3001}
    command: sh -c "npm install && npm run dev"
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./packages/server
      args:
        - SERVER_PORT=${SERVER_PORT}
    volumes:
      - ./packages/server:/app:delegated
      - server_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"
    env_file:
      - .env
    environment:
      - PORT=${SERVER_PORT}
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
    depends_on:
      - postgres
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:${SERVER_PORT:-3001}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  client_node_modules:
  server_node_modules:
  postgres_data:
