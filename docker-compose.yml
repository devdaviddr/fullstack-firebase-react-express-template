services:
  client:
    build:
      context: ./packages/client
      args:
        - CLIENT_PORT=${CLIENT_PORT}
    volumes:
      - ./packages/client:/app:delegated
      - client_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    ports:
      - "${CLIENT_PORT:-5173}:${CLIENT_PORT:-5173}"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://server:${SERVER_PORT:-3001}
    command: npm run dev

  server:
    build:
      context: ./packages/server
      args:
        - SERVER_PORT=${SERVER_PORT}
    volumes:
      - ./packages/server:/app:delegated
      - server_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"
    env_file:
      - .env
    environment:
      - PORT=${SERVER_PORT}
    command: npm run dev

volumes:
  client_node_modules:
  server_node_modules:
